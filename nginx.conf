server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Serve files and fall back to index.html for SPA routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Example proxy for API requests. Uncomment and adjust backend address if needed.
    # location /api/ {
    #     proxy_pass http://host.docker.internal:8000/;
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    # }

    gzip on;
    gzip_types text/plain application/javascript application/json text/css application/xml;
}
